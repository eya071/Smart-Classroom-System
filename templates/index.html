<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Classroom</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div id="toast" class="toast">✅ Forespørsel sendt!</div>

    <div class="shapes">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
    </div>

    <nav class="nav">
      <div class="logo">
        <div class="logo-icon">🎓</div>
        Lumen Classroom
      </div>
      <div style="display: flex; align-items: center; gap: 16px">
        <span style="font-size: 0.9rem; opacity: 0.7">Hei, {{ name }} 👋</span>
        <a
          href="/messages"
          class="notification"
          id="notif-btn"
          title="Meldinger"
        >
          🔔
          <span id="badge" class="badge" style="display: none">0</span>
        </a>
        <a
          href="/logout"
          class="btn"
          style="padding: 6px 14px; font-size: 0.85rem"
          >Logg ut</a
        >
      </div>
    </nav>

    <main class="hero fade-up">
      <div class="badge-label">✨ AI-assistert klasseromstøtte</div>
      <h1>
        Det smarte klasserommet,<br /><span class="accent">reimagined.</span>
      </h1>
      <p class="subtitle">Be om hjelp og få svar umiddelbart.</p>

      <div class="glass form-card">
        <h2>Send en forespørsel</h2>
        <p class="hint">Læreren din får en melding med en gang.</p>

        <form
          id="send-form"
          method="POST"
          action="/hjem"
          enctype="multipart/form-data"
        >
          <label>Hvordan kan vi hjelpe?</label>
          <textarea
            name="message"
            placeholder="Jeg står fast på oppgave 4..."
            required
          ></textarea>

          <label>Last opp bilde (valgfritt)</label>
          <input type="file" name="image" />

          <button type="submit" class="btn-hero">Send forespørsel →</button>
        </form>
      </div>
    </main>

    <script>
      // Toast ved redirect tilbake
      const params = new URLSearchParams(window.location.search);
      if (params.get("sendt") === "1") {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3500);
        // Fjern ?sendt=1 fra URL uten reload
        history.replaceState(null, "", "/hjem");
      }

      // Notifikasjoner
      function sjekkNotifikasjoner() {
        fetch("/notifications")
          .then((r) => r.json())
          .then((data) => {
            const badge = document.getElementById("badge");
            if (data.uleste > 0) {
              badge.textContent = data.uleste;
              badge.style.display = "inline-block";
            } else {
              badge.style.display = "none";
            }
          });
      }
      sjekkNotifikasjoner();
      setInterval(sjekkNotifikasjoner, 10000);
    </script>
  </body>
</html>
